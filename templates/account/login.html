{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .input-custom:focus {
            box-shadow: 0 0 0 2px rgba(17, 17, 17, 0.2);
        }
        .btn-custom {
            background-color: #111111;
        }
        .btn-custom:hover {
            background-color: #000000;
        }
    </style>
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('id_password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeOffIcon = document.getElementById('eye-off-icon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeOffIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeOffIcon.classList.add('hidden');
            }
        }
    </script>
</head>
<body class="bg-white min-h-screen flex flex-col">
    <!-- Main Content -->
    <div class="flex-1 flex items-center justify-center p-6">
        <div class="w-full max-w-md bg-white shadow-lg rounded-xl p-8">
            <!-- Logo -->
            <img src="{% static 'image/crmlogin.svg' %}" alt="ERP" class="h-20 mx-auto mb-6">

            <!-- Mensajes -->
            {% if messages %}
            <div class="mb-6 space-y-3">
                {% for message in messages %}
                <div class="p-3 rounded-lg text-sm {% if message.tags == 'error' %}bg-red-50 text-red-800 border border-red-200{% elif message.tags == 'success' %}bg-green-50 text-green-800 border border-green-200{% else %}bg-blue-50 text-blue-800 border border-blue-200{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}

            <!-- Login Form -->
            <form method="POST" action="{% url 'account_login' %}" class="space-y-6">
                {% csrf_token %}
                
                <div>
                    <label for="id_login" class="block text-sm font-medium mb-2" style="color: #111111;">Email</label>
                    <input 
                        type="email" 
                        name="login" 
                        id="id_login"
                        required
                        autocomplete="email"
                        class="input-custom w-full rounded-lg border border-gray-300 px-4 py-2 focus:outline-none"
                        style="color: #111111;"
                        placeholder="tu@email.com"
                    >
                </div>

                <div>
                    <label for="id_password" class="block text-sm font-medium mb-2" style="color: #111111;">Contraseña</label>
                    <div class="relative">
                        <input 
                            type="password" 
                            name="password" 
                            id="id_password"
                            required
                            autocomplete="current-password"
                            class="input-custom w-full rounded-lg border border-gray-300 px-4 py-2 pr-10 focus:outline-none"
                            style="color: #111111;"
                            placeholder="••••••••"
                        >
                        <button 
                            type="button" 
                            onclick="togglePassword()"
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 focus:outline-none"
                            aria-label="Mostrar contraseña"
                        >
                            <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                            <svg id="eye-off-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                                <line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn-custom w-full text-white py-2 rounded-lg transition">
                    Iniciar sesión
                </button>
            </form>

            <!-- Links -->
            <div class="mt-6 text-center space-y-2">
                <a href="{% url 'account_reset_password' %}" class="block text-sm hover:opacity-70" style="color: #111111;">
                    ¿Olvidaste tu contraseña?
                </a>
                <p class="text-sm" style="color: #111111;">
                    ¿No tienes cuenta? 
                    <a href="{% url 'accounts:request_demo' %}" class="font-medium hover:opacity-70" style="color: #111111;">
                        Solicitar demo
                    </a>
                </p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-6 text-center">
        <p class="text-xs text-gray-500">
            ERP es un software desarrollado y operado por SDP.<br>
            © 2026 SDP. Todos los derechos reservados.
        </p>
    </footer>
</body>
</html>
